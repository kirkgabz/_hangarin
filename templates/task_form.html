{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 rounded-4 p-4 mt-4">
            <h2 class="fw-bold mb-4">Create New Task</h2>
            <form method="POST">
                {% csrf_token %}
                
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold text-secondary">{{ field.label }}</label>
                    {{ field }}
                </div>
                {% endfor %}
                
                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="{% url 'dashboard' %}" class="btn btn-light rounded-pill px-4">Cancel</a>
                    <button type="submit" class="btn btn-gradient rounded-pill px-4 shadow-sm">Save Task</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

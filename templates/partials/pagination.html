{% if page_obj.has_other_pages %}
<div class="d-flex justify-content-center w-100 mt-3 pt-3 border-top border-white border-opacity-10">
    <div class="d-flex align-items-center gap-3">
        {% if page_obj.has_previous %}
            <a href="?{% if search_query %}search={{ search_query }}&{% endif %}{{ param_name|default:'page' }}={{ page_obj.previous_page_number }}" class="btn btn-sm btn-outline-info text-white border-opacity-50">
                <i class="bi bi-chevron-left"></i>
            </a>
        {% endif %}
        
        <span class="text-white-50 small">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
        
        {% if page_obj.has_next %}
            <a href="?{% if search_query %}search={{ search_query }}&{% endif %}{{ param_name|default:'page' }}={{ page_obj.next_page_number }}" class="btn btn-sm btn-outline-info text-white border-opacity-50">
                <i class="bi bi-chevron-right"></i>
            </a>
        {% endif %}
    </div>
</div>
{% endif %}
